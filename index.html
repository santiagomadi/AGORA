<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ÁGORA | Phygital Wellbeing</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <svg width="0" height="0" style="position:absolute;">
    <defs>
      <linearGradient id="icon-3d-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ffffff" />
        <stop offset="40%" stop-color="#d4d4d8" />
        <stop offset="100%" stop-color="#71717a" />
      </linearGradient>
      <linearGradient id="icon-3d-active" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ffffff" />
        <stop offset="30%" stop-color="#52525b" />
        <stop offset="100%" stop-color="#18181b" />
      </linearGradient>
      <filter id="drop-3d-shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="rgba(0,0,0,0.15)"/>
      </filter>
    </defs>
  </svg>

  <main class="screen">
    
    <div id="agora-splash" class="agora-splash"></div>

    <div id="dynamic-logo" class="dynamic-logo logo-hidden"></div>

    <div class="app-aura"></div>
    <div id="global-pattern-layer" class="global-pattern-layer"></div>

    <div id="view-attention" class="view active-view"></div>

    <div id="view-session" class="view view-no-padding">
      <div id="session-carousel" class="session-carousel"></div>
    </div>

    <div id="view-focus" class="view">
      <h2 class="view-title">Blueprints</h2>
      <div id="focus-dynamic-content"></div>
    </div>

    <div id="view-settings" class="view"></div>

    <nav class="bottom-nav">
      <button class="nav-item active" data-target="view-attention">
        <div class="icon-3d-wrapper"><svg viewBox="0 0 24 24"><path d="M12 1L15 8L22 11L15 14L12 21L9 14L2 11L9 8L12 1Z"/></svg></div>
        <span class="label">Attention</span>
      </button>
      <button class="nav-item" data-target="view-session">
        <div class="icon-3d-wrapper"><svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="4" rx="2"/><rect x="3" y="14" width="18" height="4" rx="2"/></svg></div>
        <span class="label">Session</span>
      </button>
      <button class="nav-item" data-target="view-focus">
        <div class="icon-3d-wrapper"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/></svg></div>
        <span class="label">Focus</span>
      </button>
      <button class="nav-item" data-target="view-settings">
        <div class="icon-3d-wrapper"><svg viewBox="0 0 24 24"><path d="M12 15.5A3.5 3.5 0 1 0 12 8.5A3.5 3.5 0 0 0 12 15.5Z" /><path d="M19.4 15A1.5 1.5 0 0 0 19 16.5L19.5 18A1.5 1.5 0 0 1 17.5 19.5L16 19A1.5 1.5 0 0 0 14.5 19.4L13 21.5A1.5 1.5 0 0 1 11 21.5L9.5 19.4A1.5 1.5 0 0 0 8 19L6.5 19.5A1.5 1.5 0 0 1 4.5 18L5 16.5A1.5 1.5 0 0 0 4.6 15L2.5 13.5A1.5 1.5 0 0 1 2.5 10.5L4.6 9A1.5 1.5 0 0 0 5 7.5L4.5 6A1.5 1.5 0 0 1 6.5 4.5L8 5A1.5 1.5 0 0 0 9.5 4.6L11 2.5A1.5 1.5 0 0 1 13 2.5L14.5 4.6A1.5 1.5 0 0 0 16 5L17.5 4.5A1.5 1.5 0 0 1 19.5 6L19 7.5A1.5 1.5 0 0 0 19.4 9L21.5 10.5A1.5 1.5 0 0 1 21.5 13.5L19.4 15Z" /></svg></div>
        <span class="label">Settings</span>
      </button>
    </nav>

  </main>

  <script src="script.js"></script>
</body>
</html>
